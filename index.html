<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>丰岛</title>
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="丰岛">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

/* ═══ LOCK PORTRAIT ═══ */
@media screen and (orientation:landscape) and (max-width:900px){
  body::before{
    content:'请竖屏使用';
    position:fixed;inset:0;z-index:99999;
    background:#1a1814;color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-family:sans-serif;letter-spacing:.1em;
  }
}

/* ═══ TOKENS ═══ */
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --surface2: #f0ede6;
  --ink:      #1a1814;
  --ink2:     #6b6560;
  --ink3:     #b0aa9f;
  --accent:   #d4820a;
  --accent2:  #fff4e0;
  --red:      #c0392b;
  --green:    #1e6b42;
  --border:   #e2ddd5;
  --border2:  #ccc7bc;
  --shadow-sm: 0 1px 3px rgba(26,24,20,0.08);
  --shadow:    0 2px 8px rgba(26,24,20,0.10);
  --shadow-lg: 0 8px 32px rgba(26,24,20,0.14);
  --r:   6px;
  --r2:  10px;
  --safe-t: env(safe-area-inset-top,0px);
  --safe-b: env(safe-area-inset-bottom,0px);
}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;-webkit-text-size-adjust:100%;}
body{font-family:'DM Sans','Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);overscroll-behavior:none;font-size:14px;line-height:1.5;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}
input,textarea{-webkit-appearance:none;}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ═══ LAYOUT ═══ */
.app{display:flex;height:100vh;padding-top:calc(52px + var(--safe-t));}

/* ═══ TOPBAR ═══ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:calc(52px + var(--safe-t));
  padding-top:var(--safe-t);
  background:var(--ink);
  display:flex;align-items:center;
  padding-left:16px;padding-right:12px;
  gap:10px;
}
.topbar-logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.topbar-logo-mark{
  width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.topbar-title{
  font-size:15px;font-weight:600;color:#fff;
  letter-spacing:0.01em;white-space:nowrap;
}
.topbar-title span{color:var(--accent);margin-left:2px;}
.topbar-actions{display:flex;align-items:center;gap:6px;}
.menu-btn{
  display:none;width:36px;height:36px;
  background:rgba(255,255,255,0.08);border:none;
  border-radius:var(--r);cursor:pointer;
  align-items:center;justify-content:center;
  color:#fff;transition:background 0.15s;
}
.menu-btn:hover{background:rgba(255,255,255,0.14);}
.tb-btn{
  height:32px;padding:0 12px;border:none;border-radius:var(--r);
  font-size:12.5px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:all 0.15s;white-space:nowrap;
}
.tb-btn-ghost{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);}
.tb-btn-ghost:hover{background:rgba(255,255,255,0.15);}
.tb-btn-accent{background:var(--accent);color:#fff;}
.tb-btn-accent:hover{background:#c07408;}
.hide-m{} /* shown on desktop */

/* Export dropdown */
.export-wrap{position:relative;}
.export-drop{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);box-shadow:var(--shadow-lg);
  min-width:170px;overflow:hidden;z-index:400;
}
.export-drop.open{display:block;}
.export-opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  font-size:13px;color:var(--ink);
  transition:background 0.12s;border-bottom:1px solid var(--border);
}
.export-opt:last-child{border-bottom:none;}
.export-opt:hover{background:var(--surface2);}
.export-opt-sub{font-size:11px;color:var(--ink3);margin-top:1px;}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:272px;min-width:272px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
}
.sb-head{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sb-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);}
.sb-count{
  font-family:'DM Mono',monospace;font-size:11px;
  background:var(--surface2);color:var(--ink2);
  padding:2px 8px;border-radius:100px;border:1px solid var(--border);
}

/* Search */
.search-wrap{position:relative;}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;}
.search-inp{
  width:100%;height:34px;
  padding:0 30px 0 32px;
  border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg);color:var(--ink);outline:none;
  font-size:13px;transition:border-color 0.2s,box-shadow 0.2s;
}
.search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,130,10,0.1);}
.search-inp::placeholder{color:var(--ink3);}
.search-clr{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--ink3);padding:3px;line-height:1;display:none;
  border-radius:3px;transition:color 0.15s;
}
.search-clr:hover{color:var(--red);}
.search-clr.vis{display:flex;}

/* Filter chips */
.filter-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.chip{
  padding:3px 10px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  font-size:11.5px;cursor:pointer;color:var(--ink2);
  transition:all 0.15s;white-space:nowrap;font-family:inherit;
}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Search results */
#search-panel{
  display:none;
  flex-shrink:0;
}
.sr-head{padding:7px 14px;font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid rgba(212,130,10,0.15);background:var(--accent2);}
.sr-item{
  padding:9px 14px;cursor:pointer;
  border-bottom:1px solid rgba(212,130,10,0.12);
  transition:background 0.12s;
}
.sr-item:hover{background:rgba(212,130,10,0.08);}
.sr-item:last-child{border-bottom:none;}
.sr-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.sr-snip{font-size:11.5px;color:var(--ink2);line-height:1.5;}
.sr-tag{
  display:inline-block;font-size:10px;background:var(--accent);
  color:#fff;border-radius:3px;padding:0 5px;margin-right:3px;
}
mark{background:#ffe47a;color:var(--ink);border-radius:2px;padding:0 1px;}

/* Process list */
.proc-list{flex:1;overflow-y:auto;padding:6px 0;}
.proc-item{
  padding:11px 14px;cursor:pointer;
  border-left:2px solid transparent;
  transition:all 0.12s;position:relative;
}
.proc-item:hover{background:var(--bg);}
.proc-item.on{background:var(--accent2);border-left-color:var(--accent);}
.proc-name{
  font-size:13.5px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding-right:24px;margin-bottom:3px;
}
.proc-meta{font-size:11px;color:var(--ink3);display:flex;gap:8px;}
.proc-del{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--ink3);padding:4px;border-radius:4px;
  transition:all 0.15s;line-height:1;font-size:12px;
}
.proc-del:hover{color:var(--red);background:rgba(192,57,43,0.08);}
.empty-msg{
  padding:40px 20px;text-align:center;
  color:var(--ink3);font-size:13px;line-height:2;
}

/* ═══ MAIN ═══ */
.main{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:24px;padding-bottom:calc(24px + var(--safe-b));
  height:100%;display:flex;flex-direction:column;gap:20px;
}

/* Welcome */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;gap:14px;min-height:50vh;
}
.welcome-mark{margin-bottom:8px;}
.welcome h2{font-size:20px;font-weight:600;color:var(--ink);}
.welcome p{font-size:13px;color:var(--ink2);line-height:1.8;max-width:280px;}

/* ═══ EDITOR ═══ */
.editor{display:flex;flex-direction:column;gap:18px;max-width:720px;width:100%;}

/* Editor header */
.ed-header{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:16px 18px;
}
.ed-title-input{
  width:100%;font-size:20px;font-weight:600;color:var(--ink);
  border:none;background:transparent;outline:none;
  padding:0;margin-bottom:10px;
}
.ed-title-input::placeholder{color:var(--ink3);font-weight:400;}
.ed-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;
  font-size:11.5px;font-weight:600;cursor:pointer;
  border:none;font-family:inherit;transition:all 0.15s;
}
.s-draft{background:var(--surface2);color:var(--ink2);border:1px solid var(--border2);}
.s-active{background:rgba(30,107,66,0.1);color:var(--green);border:1px solid rgba(30,107,66,0.2);}
.s-archived{background:rgba(192,57,43,0.08);color:var(--red);border:1px solid rgba(192,57,43,0.15);}
.tag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--ink);color:#fff;
  padding:2px 8px;border-radius:4px;font-size:11px;
}
.tag button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);font-size:11px;line-height:1;padding:0;}
.tag-inp{
  border:none;background:transparent;outline:none;
  font-size:12px;color:var(--ink);width:80px;
}
.tag-inp::placeholder{color:var(--ink3);}
.ed-action-row{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--r);border:none;
  font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
  touch-action:manipulation;line-height:1.4;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#c07408;}
.btn-outline{background:transparent;color:var(--ink2);border:1px solid var(--border2);}
.btn-green{background:#1e6b42;color:#fff;}
.btn-green:hover{background:#185838;}
.btn-outline:hover{background:var(--surface2);border-color:var(--border2);color:var(--ink);}
.btn-sm{padding:5px 11px;font-size:12px;}

/* Section card */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
}
.card-head{
  padding:11px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.card-head-icon{
  width:26px;height:26px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  background:var(--ink);flex-shrink:0;
}
.card-head-title{font-size:13px;font-weight:600;color:var(--ink);}
.card-body{padding:14px 16px;}

/* Param rows */
.param-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.param-row:last-child{border-bottom:none;}
.param-label{font-size:12.5px;color:var(--ink2);min-width:76px;flex-shrink:0;}
.param-input{
  flex:1;border:none;border-bottom:1px solid var(--border);
  background:transparent;color:var(--ink);outline:none;
  font-family:'DM Mono',monospace;font-size:14px;font-weight:500;
  padding:2px 0;text-align:right;transition:border-color 0.2s;min-width:0;
}
.param-input:focus{border-bottom-color:var(--accent);}
.param-input::placeholder{font-family:'DM Sans','Noto Sans SC',sans-serif;font-size:12px;font-weight:400;color:var(--ink3);}
.param-unit{font-size:11.5px;color:var(--ink3);min-width:26px;}

/* Param extra (notes + images) */
.param-extra{
  border-top:1px solid var(--border);
  padding:12px 0 4px;
  display:flex;flex-direction:column;gap:10px;
}
.param-extra-label{
  font-size:11px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:4px;
}
.note-area{
  width:100%;min-height:52px;border:1px solid var(--border);
  border-radius:var(--r);padding:8px 10px;background:var(--bg);
  color:var(--ink);resize:none;outline:none;font-size:13px;
  line-height:1.6;transition:border-color 0.2s;
}
.note-area:focus{border-color:var(--accent);}
.note-area::placeholder{color:var(--ink3);}

/* Image upload row */
.img-row{display:flex;gap:7px;flex-wrap:wrap;}
.img-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--r);
  font-size:12.5px;font-weight:500;cursor:pointer;
  transition:all 0.15s;touch-action:manipulation;border:none;
}
.img-btn-cam{background:var(--ink);color:#fff;}
.img-btn-cam:hover{background:#333;}
.img-btn-gal{background:var(--surface2);color:var(--ink2);border:1px solid var(--border2);}
.img-btn-gal:hover{background:var(--border);color:var(--ink);}
.img-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
  gap:7px;margin-top:4px;
}
.img-thumb{
  position:relative;border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);background:var(--surface2);
  aspect-ratio:4/3;cursor:zoom-in;
}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.img-del{
  position:absolute;top:3px;right:3px;
  background:rgba(15,15,15,0.65);color:#fff;border:none;
  border-radius:4px;width:20px;height:20px;font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.15s;line-height:1;
}
.img-thumb:hover .img-del{opacity:1;}
@media(hover:none){.img-del{opacity:0.9;}}

/* Textarea */
.txt-area{
  width:100%;min-height:64px;border:1px solid var(--border);
  border-radius:var(--r);padding:9px 11px;background:var(--bg);
  color:var(--ink);resize:none;outline:none;font-size:13.5px;
  line-height:1.65;transition:border-color 0.2s;
}
.txt-area:focus{border-color:var(--accent);}
.txt-area::placeholder{color:var(--ink3);}

/* Steps */
.step-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:13px 14px;
  display:flex;gap:12px;align-items:flex-start;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.step-card:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}
.step-num-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.step-num{
  width:26px;height:26px;border-radius:5px;
  background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;
}
.step-line{width:1px;flex:1;background:var(--border);min-height:12px;margin-top:4px;}
.step-body{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;}
.step-title-inp{
  border:none;background:transparent;font-size:14px;font-weight:600;
  color:var(--ink);width:100%;outline:none;padding:0;
}
.step-title-inp::placeholder{color:var(--ink3);font-weight:400;}
.step-desc-inp{
  border:none;background:transparent;font-size:13px;color:var(--ink2);
  width:100%;outline:none;padding:0;resize:none;min-height:18px;line-height:1.55;
}
.step-desc-inp::placeholder{color:var(--ink3);}
.step-foot{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.step-type-sel{
  font-size:11px;border:1px solid var(--border);border-radius:4px;
  padding:2px 6px;background:var(--surface2);color:var(--ink2);
  cursor:pointer;outline:none;font-family:inherit;
}
.step-acts{display:flex;gap:4px;margin-left:auto;}
.s-btn{
  background:none;border:1px solid var(--border);border-radius:4px;
  padding:3px 7px;cursor:pointer;font-size:11.5px;color:var(--ink3);
  transition:all 0.15s;font-family:inherit;
}
.s-btn:hover{background:var(--surface2);color:var(--ink);border-color:var(--border2);}
.s-btn.del:hover{background:rgba(192,57,43,0.07);color:var(--red);border-color:rgba(192,57,43,0.25);}
.add-step-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:10px;border:1.5px dashed var(--border2);
  border-radius:var(--r2);background:none;cursor:pointer;
  font-size:13px;color:var(--ink3);font-family:inherit;
  transition:all 0.2s;margin-top:4px;
}
.add-step-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2);}

/* View mode */
.view-param-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;margin-bottom:10px;
}
.view-param-head{
  padding:10px 15px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  background:var(--ink);
}
.view-param-head-title{font-size:13px;font-weight:600;color:#fff;}
.view-param-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 15px;border-bottom:1px solid var(--border);
}
.view-param-row:last-child{border-bottom:none;}
.view-param-label{font-size:12.5px;color:var(--ink2);}
.view-param-val{
  font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--ink);
}
.view-param-val.na{color:var(--ink3);font-size:12px;font-family:inherit;font-weight:400;}
.view-note{
  padding:10px 15px;background:var(--accent2);
  border-top:1px solid rgba(212,130,10,0.15);
  font-size:12.5px;color:var(--ink2);line-height:1.65;
}
.view-step-card{
  display:flex;gap:12px;padding:11px 0;
  border-bottom:1px solid var(--border);
}
.view-step-card:last-child{border-bottom:none;}
.view-step-num{
  width:26px;height:26px;flex-shrink:0;border-radius:5px;
  background:var(--ink);color:#fff;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
}
.view-step-body{flex:1;min-width:0;}
.view-step-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.view-step-desc{font-size:13px;color:var(--ink2);line-height:1.6;word-break:break-word;}
.view-step-type{
  display:inline-block;font-size:10.5px;background:var(--surface2);
  border:1px solid var(--border);border-radius:3px;padding:1px 6px;
  color:var(--ink3);margin-top:4px;
}
.view-date{font-size:11px;color:var(--ink3);text-align:right;padding-top:6px;}

/* Lightbox */
#lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(15,15,15,0.94);z-index:9000;
  align-items:center;justify-content:center;padding:16px;
}
#lightbox.open{display:flex;}
#lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,0.5);}
.lb-close{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,0.1);border:none;border-radius:var(--r);
  width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background 0.15s;
}
.lb-close:hover{background:rgba(255,255,255,0.2);}

/* Notif */
.notif{
  position:fixed;top:calc(62px + var(--safe-t));left:50%;
  transform:translateX(-50%) translateY(-6px);
  background:var(--ink);color:#fff;
  padding:8px 16px;border-radius:100px;font-size:12.5px;font-weight:500;
  border-left:3px solid var(--accent);opacity:0;
  transition:all 0.2s;z-index:9998;pointer-events:none;white-space:nowrap;
  box-shadow:var(--shadow-lg);
}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}


/* Unsaved dot */
.unsaved-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);display:none;
  flex-shrink:0;margin-left:4px;
}
.unsaved-dot.vis{display:block;}

/* Unsaved dialog */
.dlg-overlay{
  display:none;position:fixed;inset:0;z-index:9990;
  background:rgba(0,0,0,0.5);align-items:center;justify-content:center;
  padding:20px;
}
.dlg-overlay.open{display:flex;}
.dlg{
  background:var(--surface);border-radius:var(--r2);
  padding:24px;max-width:320px;width:100%;
  box-shadow:var(--shadow-lg);
}
.dlg h3{font-size:15px;font-weight:600;margin-bottom:8px;}
.dlg p{font-size:13px;color:var(--ink2);margin-bottom:18px;line-height:1.6;}
.dlg-btns{display:flex;gap:8px;justify-content:flex-end;}

/* Drawer overlay */
.drawer-overlay{
  display:none;position:fixed;inset:0;z-index:49;
  background:rgba(0,0,0,0.35);
  opacity:0;transition:opacity 0.25s;
}
.drawer-overlay.open{display:block;opacity:1;}

/* Sort row */
.sort-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;border-bottom:1px solid var(--border);
  font-size:11px;color:var(--ink3);flex-shrink:0;
}
.sort-sel{
  font-size:11px;border:none;background:transparent;
  color:var(--accent);cursor:pointer;outline:none;font-family:inherit;font-weight:500;
}

/* Stats grid */
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.stat-item{
  display:flex;flex-direction:column;gap:1px;
  padding:7px 9px;background:var(--bg);
  border-radius:var(--r);border:1px solid var(--border);
}
.stat-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--ink);}
.stat-label{font-size:10px;color:var(--ink3);}

/* Search button */
.search-btn{
  height:34px;padding:0 10px;border:none;border-radius:var(--r);
  background:var(--accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;white-space:nowrap;
  flex-shrink:0;transition:background 0.15s;
}
.search-btn:hover{background:#c07408;}
.search-wrap{display:flex;gap:6px;align-items:center;}
.search-field{position:relative;flex:1;}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:1;}
.search-inp{padding-left:32px !important;}

/* Mobile import button */
.tb-btn-import-m{display:none;}

/* Install banner */
#install-banner{
  display:none;position:fixed;
  bottom:calc(12px + var(--safe-b));left:12px;right:12px;
  background:var(--ink);color:#fff;border-radius:var(--r2);
  padding:14px 16px;z-index:9999;
  box-shadow:var(--shadow-lg);border-left:3px solid var(--accent);
  align-items:center;gap:12px;
}
#install-banner.show{display:flex;}
.ib-text strong{display:block;font-size:13px;margin-bottom:2px;}
.ib-text span{font-size:11.5px;color:rgba(255,255,255,0.55);}
.ib-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:6px 14px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ib-dis{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:16px;flex-shrink:0;padding:4px;}

/* ═══ MOBILE ═══ */
@media(max-width:640px){
  .sidebar{
    position:fixed;top:calc(52px + var(--safe-t));left:0;
    bottom:calc(52px + var(--safe-b));
    width:85%;max-width:300px;min-width:unset;
    border-right:none;z-index:150;
    transform:translateX(-100%);

  .sidebar.open{transform:translateX(0);box-shadow:6px 0 24px rgba(0,0,0,0.18);}
  .main{padding-bottom:calc(68px + var(--safe-b));}

  .mob-nav{display:flex !important;}

}
@media(min-width:641px){.mob-nav{display:none !important;}}

/* Mobile nav */
.mob-nav{

/* Print */
@media print{

}

<script>
'use strict';

/* ═══ PARAM GROUPS ═══ */
const GROUPS = [
  { key:'zp', label:'中频炉加热参数', color:'#c8460a',
    params:[
      {key:'temp',     label:'加热温度', unit:'℃',  ph:'如 1200'},
      {key:'distance', label:'加热距离', unit:'mm', ph:'如 150'}
    ]
  },
  { key:'dc', label:'镦粗机推进参数', color:'#1a6b8a',
    params:[
      {key:'back',   label:'后退限',   unit:'mm', ph:'如 50'},
      {key:'slow',   label:'前进减速', unit:'mm', ph:'如 120'},
      {key:'fwd',    label:'前进限',   unit:'mm', ph:'如 200'}
    ]
  },
  { key:'zw', label:'折弯参数', color:'#3a6b2a',
    params:[
      {key:'pos', label:'定位参数', unit:'mm', ph:'如 85'}
    ]
  }
];

/* ═══ STATE ═══ */
let procs = [];
let curId = null;
let viewMode = false;
let filter = 'all';
let curSortBy = 'updatedAt';
let deferredInstall = null;
let imgTarget = null;
let isDirty = false;
let pendingAction = null;
let currentQuery = '';

try { procs = JSON.parse(localStorage.getItem('wf_v4')||'[]'); } catch(_){ procs=[]; }

/* ═══ UTILS ═══ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function save(){ try{ localStorage.setItem('wf_v4',JSON.stringify(procs)); }catch(e){ notify('⚠ 存储不足，请导出备份'); } }
function getP(id){ return procs.find(p=>p.id===id); }
function sLabel(s){ return {draft:'草稿',active:'已启用',archived:'已归档'}[s]||'草稿'; }
function sDot(s){ return {draft:'○',active:'●',archived:'△'}[s]||'○'; }
function isLocked(p){ return p&&(p.status==='active'||p.status==='archived'); }
function fDate(ts){ if(!ts) return ''; const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate(); }

let _nt;
function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_nt); _nt=setTimeout(()=>el.classList.remove('show'),2400);
}
function ar(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function setDirty(v){
  isDirty=v;
  const dot=document.getElementById('unsaved-dot');
  if(dot) dot.classList.toggle('vis',v);
}

function initParams(p){
  if(!p.params) p.params={};
  if(!p.paramNotes) p.paramNotes={};
  if(!p.paramImages) p.paramImages={};
  GROUPS.forEach(g=>{
    if(!p.params[g.key]) p.params[g.key]={};
    g.params.forEach(pp=>{ if(p.params[g.key][pp.key]===undefined) p.params[g.key][pp.key]=''; });
    if(!p.paramNotes[g.key]) p.paramNotes[g.key]='';
    if(!p.paramImages[g.key]) p.paramImages[g.key]=[];
  });
}

}

/* ═══ SWIPE-BACK GESTURE ═══ */
(()=>{
  let sx=0,sy=0,sw=false;
  document.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    sx=t.clientX; sy=t.clientY;
    sw=t.clientX<28;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!sw) return; sw=false;
    const t=e.changedTouches[0];
    const dx=t.clientX-sx, dy=Math.abs(t.clientY-sy);
    if(dx>60&&dy<80){
      if(document.getElementById('sidebar').classList.contains('open')){ closeSB(); return; }
      if(curId&&!viewMode){ guardUnsaved(()=>{ viewMode=true; renderEditor(); }); return; }
      if(curId&&viewMode){ curId=null; showWelcome(); return; }
    }
  },{passive:true});
})();

/* ═══ SORT ═══ */
document.getElementById('sort-sel').onchange=function(){
  curSortBy=this.value; renderSB(currentQuery);
};
function sortedProcs(list){
  return [...list].sort((a,b)=>{
    if(curSortBy==='name') return (a.name||'').localeCompare(b.name||'','zh');
    if(curSortBy==='steps') return (b.steps||[]).length-(a.steps||[]).length;
    if(curSortBy==='createdAt') return (b.createdAt||0)-(a.createdAt||0);
    return (b.updatedAt||0)-(a.updatedAt||0);
  });
}

/* ═══ SEARCH ═══ */
function fuzzyMatch(text,q){
  if(!q) return true;
  text=(text||'').toLowerCase(); q=q.toLowerCase();
  if(text.includes(q)) return true;
  let qi=0;
  for(let i=0;i<text.length&&qi<q.length;i++){ if(text[i]===q[qi]) qi++; }
  return qi===q.length;
}

document.getElementById('search-inp').addEventListener('input',function(){
  currentQuery=this.value;
  document.getElementById('search-clr').classList.toggle('vis',this.value.length>0);
  renderSB(this.value);
});
document.getElementById('search-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ renderSB(this.value); this.blur(); }
});
document.getElementById('search-btn').onclick=()=>{ renderSB(document.getElementById('search-inp').value); };
document.getElementById('search-clr').onclick=()=>{
  document.getElementById('search-inp').value='';
  document.getElementById('search-clr').classList.remove('vis');
  currentQuery=''; renderSB('');
  document.getElementById('search-inp').focus();
};

function hl(text,q){
  if(!q) return text;
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return text.replace(re,m=>'<mark>'+m+'</mark>');
}
function trunc(s,q,max){
  if(!s) return '';
  const i=s.toLowerCase().indexOf(q.toLowerCase());
  let t=(i>12)?'…'+s.slice(Math.max(0,i-8)):s;
  return t.length>max?t.slice(0,max)+'…':t;
}

function renderSB(query){
  const q=(query||'').trim();
  const list=document.getElementById('proc-list');
  const panel=document.getElementById('search-panel');
  const slist=document.getElementById('search-list');
  document.getElementById('proc-count').textContent=procs.length;
  const stEl=document.getElementById('st-total'); if(stEl) stEl.textContent=procs.length;
  const saEl=document.getElementById('st-active'); if(saEl) saEl.textContent=procs.filter(p=>p.status==='active').length;

  let base=filter==='all'?procs:procs.filter(p=>p.status===filter);
  base=sortedProcs(base);

  const filtered=q?base.filter(p=>{
    if(fuzzyMatch(p.name||'',q)) return true;
    if(fuzzyMatch(p.description||'',q)) return true;
    if((p.tags||[]).some(t=>fuzzyMatch(t,q))) return true;
    if((p.steps||[]).some(s=>fuzzyMatch(s.title||'',q)||fuzzyMatch(s.desc||'',q))) return true;
    if(GROUPS.some(g=>g.params.some(pp=>fuzzyMatch(String(((p.params||{})[g.key]||{})[pp.key]||''),q)))) return true;
    if(GROUPS.some(g=>fuzzyMatch((p.paramNotes||{})[g.key]||'',q))) return true;
    return false;
  }):base;

  // Always show results in proc-list (hidden search-panel not used for display)
  panel.style.display='none';
  list.style.display='';

  if(!filtered.length){
    if(q){
      list.innerHTML=`<div class="empty-msg" style="color:var(--accent)">没有找到<br>「${esc(q)}」</div>`;
    } else {
      list.innerHTML=`<div class="empty-msg">暂无${filter!=='all'?'「'+sLabel(filter)+'」':''}流程</div>`;
    }
    return;
  }

  // Build result HTML - with search highlights when query active
  list.innerHTML=(q?`<div class="sr-head">找到 ${filtered.length} 条结果</div>`:'')
    +filtered.map(p=>{
      if(q){
        // Search result view: show match badges and snippet
        let badges='', snip='';
        if(fuzzyMatch(p.name||'',q)) badges+='<span class="sr-tag">型号</span>';
        if((p.tags||[]).some(t=>fuzzyMatch(t,q))) badges+='<span class="sr-tag">标签</span>';
        GROUPS.forEach(g=>{
          g.params.forEach(pp=>{
            const v=String(((p.params||{})[g.key]||{})[pp.key]||'');
            if(fuzzyMatch(v,q)){ badges+='<span class="sr-tag">参数</span>'; if(!snip) snip=hl(esc(pp.label+'：'+v+' '+pp.unit),q); }
          });
          const note=(p.paramNotes||{})[g.key]||'';
          if(fuzzyMatch(note,q)){ badges+='<span class="sr-tag">备注</span>'; if(!snip) snip=hl(esc(trunc(note,q,45)),q); }
        });
        const ms=(p.steps||[]).filter(s=>fuzzyMatch(s.title||'',q)||fuzzyMatch(s.desc||'',q));
        if(ms.length){ badges+=`<span class="sr-tag">步骤×${ms.length}</span>`; if(!snip) snip=hl(esc(trunc((ms[0].title||'')+(ms[0].desc?' '+ms[0].desc:''),q,45)),q); }
        return `<div class="proc-item ${p.id===curId?'on':''}" data-id="${p.id}" style="border-left-color:${p.id===curId?'var(--accent)':'transparent'}">
          <div class="proc-name">${hl(esc(p.name||'未命名'),q)}</div>
          <div class="sr-snip" style="margin-top:3px;">${badges}${snip?` <span style="font-size:11px;color:var(--ink2)">${snip}</span>`:''}</div>
          <button class="proc-del" data-del="${p.id}" title="删除">
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>`;
      } else {
        return `<div class="proc-item ${p.id===curId?'on':''}" data-id="${p.id}">
          <div class="proc-name">${esc(p.name||'未命名流程')}</div>
          <div class="proc-meta">
            <span style="color:${p.status==='active'?'var(--green)':p.status==='archived'?'var(--ink3)':'var(--accent)'}">${p.status==='active'?'🔒 ':p.status==='archived'?'📁 ':'✏️ '}${sLabel(p.status)}</span>
            <span>${(p.steps||[]).length} 步</span>
            <span>${fDate(p.updatedAt)}</span>
          </div>
          <button class="proc-del" data-del="${p.id}" title="删除">
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>`;
      }
    }).join('');

  list.querySelectorAll('.proc-item').forEach(el=>{
    el.onclick=e=>{ if(e.target.closest('.proc-del')) return; guardUnsaved(()=>{ openProc(el.dataset.id); if(window.innerWidth<=640) closeSB(); }); };
  });
  list.querySelectorAll('.proc-del').forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); deleteProc(btn.dataset.del); };
  });
}

function createProc(){

    tags:[], status:'draft', params:{}, paramNotes:{}, paramImages:{},
    steps:[], images:[], createdAt:Date.now(), updatedAt:Date.now()
  };
  initParams(p);
  procs.unshift(p); save();
  openProc(p.id);
  if(window.innerWidth<=640) closeSB();
}
function openProc(id){
  curId=id;
  const p=getP(id);
  viewMode=isLocked(p); // 已启用/归档直接只读
  setDirty(false);
  renderSB(currentQuery);
  renderEditor();
}
function deleteProc(id){
  if(!confirm('确定删除此流程？')) return;
  procs=procs.filter(p=>p.id!==id);
  if(curId===id){ curId=null; setDirty(false); showWelcome(); }
  save(); renderSB(currentQuery);
  notify('已删除');
}

  document.getElementById('cover-cam').onclick=()=>{ imgTarget={scope:'cover'}; document.getElementById('file-cam').click(); };
  document.getElementById('cover-gal').onclick=()=>{ imgTarget={scope:'cover'}; document.getElementById('file-gal').click(); };

  renderTags(p);
  renderParams(p);
  renderSteps(p);
  renderCoverImgs(p);
}

/* ── Tags ── */
function renderTags(p){
  const w=document.getElementById('ed-tags'); if(!w) return;
  w.innerHTML=(p.tags||[]).map((t,i)=>
    `<span class="tag">${esc(t)}<button data-ti="${i}">✕</button></span>`
  ).join('')+`<input class="tag-inp" placeholder="＋ 标签" id="tag-inp">`;
  w.style.cssText='display:flex;align-items:center;gap:5px;flex-wrap:wrap;';
  w.querySelectorAll('.tag button').forEach(b=>{
    b.onclick=()=>{ p.tags.splice(+b.dataset.ti,1); p.updatedAt=Date.now(); setDirty(true); renderTags(p); };
  });
  const ti=document.getElementById('tag-inp');
  ti.onkeydown=e=>{
    if(e.key!=='Enter'&&e.key!==',') return;
    e.preventDefault();
    const v=ti.value.trim().replace(/,/g,'');
    if(!v||(p.tags||[]).includes(v)){ ti.value=''; return; }
    if(!p.tags) p.tags=[];
    p.tags.push(v); ti.value=''; p.updatedAt=Date.now(); setDirty(true); renderTags(p);
  };
}

/* ── Steps ── */

  });
  wrap.querySelectorAll('.step-type-sel').forEach(el=>{

function addStep(){
  const p=getP(curId); if(!p) return;
  p.steps.push({title:'',desc:'',type:'操作',images:[]});
  p.updatedAt=Date.now(); setDirty(true); save(); renderSteps(p);
  const ins=document.querySelectorAll('.step-title-inp');
  if(ins.length) ins[ins.length-1].focus();
}

function syncEd(p){
  const t=document.getElementById('ed-title'); if(t) p.name=t.value;
  const d=document.getElementById('ed-desc'); if(d) p.description=d.value;
  document.querySelectorAll('.step-desc-inp').forEach(el=>{ if(p.steps[+el.dataset.si]) p.steps[+el.dataset.si].desc=el.value; });
  document.querySelectorAll('.param-input').forEach(inp=>{
    if(!p.params[inp.dataset.gkey]) p.params[inp.dataset.gkey]={};
    p.params[inp.dataset.gkey][inp.dataset.pkey]=inp.value;
  });
  document.querySelectorAll('.note-area').forEach(ta=>{ p.paramNotes[ta.dataset.gkey]=ta.value; });
}

function saveProc(){
  const p=getP(curId); if(!p) return;
  syncEd(p); p.updatedAt=Date.now(); save(); setDirty(false);
  renderSB(currentQuery);
  notify('✓ 草稿已保存');
}

function activateProc(){
  const p=getP(curId); if(!p) return;
  syncEd(p);
  if(!p.name||!p.name.trim()){ notify('⚠ 请先填写型号名称'); document.getElementById('ed-title')&&document.getElementById('ed-title').focus(); return; }
  p.status='active'; p.updatedAt=Date.now(); save(); setDirty(false);
  viewMode=true; // 启用后进入只读
  renderSB(currentQuery);
  renderEditor();
  notify('✅ 已启用，进入只读模式');
}

/* ═══ IMAGES ═══ */
function handleFiles(files){
  if(!imgTarget||!files||!files.length) return;
  Array.from(files).forEach(f=>{ if(f.type.startsWith('image/')) compress(f,imgTarget); });
}
document.getElementById('file-cam').onchange=function(){ handleFiles(this.files); this.value=''; };
document.getElementById('file-gal').onchange=function(){ handleFiles(this.files); this.value=''; };

function compress(file,target){
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1200,c=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ if(w>=h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      storeImg({id:'i'+Date.now()+'_'+Math.random().toString(36).slice(2),data:c.toDataURL('image/jpeg',0.78)},target);
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

function storeImg(im,target){
  const p=getP(curId); if(!p) return;
  if(target.scope==='cover'){
    if(!p.images) p.images=[];
    p.images.push(im); renderCoverImgs(p);
  } else if(target.scope==='step'){
    const s=p.steps[target.stepIdx]; if(!s) return;
    if(!s.images) s.images=[];
    s.images.push(im); renderStepImgs(s,target.stepIdx);
  } else if(target.scope==='group'){
    if(!p.paramImages) p.paramImages={};
    if(!p.paramImages[target.gkey]) p.paramImages[target.gkey]=[];
    p.paramImages[target.gkey].push(im); renderGroupImgs(p,target.gkey);
  }
  p.updatedAt=Date.now(); save(); setDirty(true); notify('图片已添加');
}

function renderCoverImgs(p){
  const g=document.getElementById('cover-grid'); if(!g) return;
  g.innerHTML=(p.images||[]).map((im,i)=>`
    <div class="img-thumb"><img src="${im.data}" alt="" data-i="${i}">
    <button class="img-del" data-di="${im.id}" data-ds="cover" data-si="-1">
      <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button></div>`).join('');
  g.querySelectorAll('img').forEach((el,i)=>{ el.onclick=()=>openLB((p.images||[])[i].id,'cover','-1'); });
  g.querySelectorAll('.img-del').forEach(b=>{ b.onclick=e=>{ e.stopPropagation(); delImg(b.dataset.di,'cover',-1); }; });
}

function renderStepImgs(s,si){
  const g=document.getElementById('step-grid-'+si); if(!g) return;
  g.innerHTML=(s.images||[]).map((im,i)=>`
    <div class="img-thumb"><img src="${im.data}" alt="" data-i="${i}">
    <button class="img-del" data-di="${im.id}" data-ds="step" data-si="${si}">
      <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button></div>`).join('');
  g.querySelectorAll('img').forEach((el,i)=>{ el.onclick=()=>openLB((s.images||[])[i].id,'step',si); });
  g.querySelectorAll('.img-del').forEach(b=>{ b.onclick=e=>{ e.stopPropagation(); delImg(b.dataset.di,'step',+b.dataset.si); }; });
}

function renderGroupImgs(p,gkey){
  const g=document.getElementById('pg-grid-'+gkey); if(!g) return;
  const imgs=(p.paramImages||{})[gkey]||[];
  g.innerHTML=imgs.map((im,i)=>`
    <div class="img-thumb"><img src="${im.data}" alt="" data-i="${i}">
    <button class="img-del" data-di="${im.id}" data-ds="group" data-gk="${gkey}">
      <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button></div>`).join('');
  g.querySelectorAll('img').forEach((el,i)=>{ el.onclick=()=>openLB(imgs[i].id,'group',gkey); });
  g.querySelectorAll('.img-del').forEach(b=>{ b.onclick=e=>{ e.stopPropagation(); delImg(b.dataset.di,'group',b.dataset.gk); }; });
}

function delImg(imgId,scope,ref){
  const p=getP(curId); if(!p) return;
  if(scope==='cover'){ p.images=(p.images||[]).filter(x=>x.id!==imgId); renderCoverImgs(p); }
  else if(scope==='step'){ const s=p.steps[ref]; if(s){ s.images=(s.images||[]).filter(x=>x.id!==imgId); renderStepImgs(s,ref); } }
  else if(scope==='group'){
    if(!p.paramImages) p.paramImages={};
    p.paramImages[ref]=(p.paramImages[ref]||[]).filter(x=>x.id!==imgId); renderGroupImgs(p,ref);
  }
  p.updatedAt=Date.now(); save();
}

function openLB(imgId,scope,ref){
  const p=getP(curId); if(!p) return;
  let imgs=[];
  if(scope==='cover') imgs=p.images||[];
  else if(scope==='step') imgs=(p.steps[+ref]||{}).images||[];
  else if(scope==='group') imgs=(p.paramImages||{})[ref]||[];
  const im=imgs.find(x=>x.id===imgId); if(!im) return;
  document.getElementById('lb-img').src=im.data;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lb-close').onclick=()=>document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').onclick=e=>{ if(e.target===e.currentTarget) document.getElementById('lightbox').classList.remove('open'); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('lightbox').classList.remove('open'); });

/* ═══ EXPORT / IMPORT ═══ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(procs,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download='丰岛-备份-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(url); notify('💾 JSON 备份已导出（含图片）');
}

function exportExcel(){
  const BOM='\uFEFF';
  const headers=['型号/名称','状态','中频炉-温度(℃)','中频炉-距离(mm)','镦粗机-后退限(mm)','镦粗机-前进减速(mm)','镦粗机-前进限(mm)','折弯-定位(mm)','步骤数','步骤详情','标签','备注','封面图片数','步骤图片数','工序图片数','更新日期'];
  const rows=procs.map(p=>{
    const pr=p.params||{};
    const coverCount=(p.images||[]).length;
    const stepImgCount=(p.steps||[]).reduce((n,s)=>n+(s.images||[]).length,0);
    const paramImgCount=Object.values(p.paramImages||{}).reduce((n,arr)=>n+(arr||[]).length,0);
    const stepsDetail=(p.steps||[]).map((s,i)=>`${i+1}.${s.title||''}${s.desc?' - '+s.desc:''}`).join(' | ');
    return [
      p.name||'',
      sLabel(p.status),
      (pr.zp||{}).temp||'',
      (pr.zp||{}).distance||'',
      (pr.dc||{}).back||'',
      (pr.dc||{}).slow||'',
      (pr.dc||{}).fwd||'',
      (pr.zw||{}).pos||'',
      (p.steps||[]).length,
      stepsDetail,
      (p.tags||[]).join('|'),
      p.description||'',
      coverCount,
      stepImgCount,
      paramImgCount,
      p.updatedAt?new Date(p.updatedAt).toLocaleDateString('zh-CN'):''
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv=BOM+headers.map(h=>'"'+h+'"').join(',')+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download='丰岛-表格-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url); notify('📊 Excel 表格已导出（含图片统计）');
}

document.getElementById('file-import').onchange=function(){
  const file=this.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(!confirm(`导入 ${data.length} 个流程？\n（合并到现有数据，重复 ID 跳过）`)) return;
      const ids=new Set(procs.map(p=>p.id)); let added=0;
      data.forEach(p=>{ if(!ids.has(p.id)){ procs.push(p); added++; } });
      save(); renderSB(currentQuery); notify(`✓ 导入了 ${added} 个流程`);
    }catch{ alert('文件格式不正确，请选择有效的 JSON 备份文件'); }
  };
  r.readAsText(file); this.value='';
};

/* ═══ INIT ═══ */
renderSB('');
